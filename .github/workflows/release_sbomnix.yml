name: Upload Release Asset

on:
  push:
    # Run on push events where tags match v*, e.g. v1.3.0
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Upload Release Asset
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - name: Build release asset
        run: nix develop --command make release-asset
      - name: Upload release asset
        uses: svenstaro/upload-release-action@b98a3b12e86552593f3e4e577ca8a62aa2f3f22b # v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/sbom*
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
